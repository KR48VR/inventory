<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scott Adams - Real Coffee Video Inventory</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#000;color:#e5e5e5;display:flex;min-height:100vh;overflow-x:hidden}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#000}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#E8941A}

/* SIDEBAR */
.sidebar{width:280px;background:#0a0a0a;padding:28px 20px;position:fixed;top:0;left:0;bottom:0;overflow-y:auto;border-right:3px solid #E8941A;z-index:10}

.logo-area{margin-bottom:20px;text-align:center;padding-bottom:20px;border-bottom:3px solid #E8941A}
.logo-title{font-family:'Anton',sans-serif;font-size:2.4em;color:#fff;text-transform:uppercase;line-height:1;letter-spacing:3px;margin-bottom:2px}
.logo-accent{font-family:'Anton',sans-serif;font-size:1.1em;color:#E8941A;text-transform:uppercase;letter-spacing:6px}
.subtitle{color:#888;font-size:0.75em;margin-top:8px;letter-spacing:1px}

.search-box{width:100%;padding:12px 14px;background:#111;border:2px solid #333;border-radius:0;color:#fff;font-size:14px;margin-bottom:10px;outline:none;transition:border-color .3s;font-family:'Inter',sans-serif}
.search-box:focus{border-color:#E8941A}
.search-box::placeholder{color:#555}

.clear-btn{background:transparent;color:#E8941A;border:2px solid #E8941A;padding:10px 12px;border-radius:0;cursor:pointer;font-size:11px;width:100%;margin-bottom:16px;transition:all .2s;text-transform:uppercase;letter-spacing:3px;font-weight:700;font-family:'Anton',sans-serif}
.clear-btn:hover{background:#E8941A;color:#000}

.active-filters{font-size:11px;color:#E8941A;margin-bottom:10px;min-height:16px;font-weight:600}

.filter-group{margin-bottom:16px}
.filter-group label{display:block;font-family:'Anton',sans-serif;font-size:0.85em;color:#E8941A;text-transform:uppercase;letter-spacing:4px;margin-bottom:6px}

select{width:100%;padding:10px 12px;background:#111;border:2px solid #333;border-radius:0;color:#fff;font-size:13px;margin-bottom:8px;cursor:pointer;transition:border-color .2s;-webkit-appearance:none;appearance:none;font-family:'Inter',sans-serif}
select:hover,select:focus{border-color:#E8941A;outline:none}

/* Theme pills */
.theme-item{padding:8px 14px;cursor:pointer;font-size:13px;margin-bottom:2px;transition:all .15s;color:#888;font-weight:600;border-left:3px solid transparent;text-transform:uppercase;letter-spacing:1px;font-size:0.75em}
.theme-item:hover{color:#E8941A;border-left-color:#E8941A;background:rgba(232,148,26,0.05)}
.theme-item.active{color:#000;background:#E8941A;border-left-color:#E8941A;font-weight:700}

.export-btn{background:#E8941A;color:#000;border:none;padding:12px 16px;border-radius:0;cursor:pointer;font-size:12px;font-weight:700;margin-top:8px;width:100%;transition:all .2s;text-transform:uppercase;letter-spacing:3px;font-family:'Anton',sans-serif}
.export-btn:hover{background:#fff;color:#000}

.sidebar-footer{color:#444;font-size:11px;margin-top:24px;padding-top:16px;border-top:2px solid #222;text-transform:uppercase;letter-spacing:2px;text-align:center}

/* MAIN CONTENT */
.main{margin-left:280px;flex:1;padding:24px 30px;width:calc(100% - 280px)}

/* Hero stats bar */
.stats-bar{background:#0a0a0a;padding:20px 28px;margin-bottom:24px;display:flex;gap:32px;flex-wrap:wrap;align-items:center;border:3px solid #E8941A;position:relative}
.stats-bar .big-num{font-family:'Anton',sans-serif;font-size:2.8em;color:#E8941A;line-height:1}
.stats-bar .big-label{font-size:0.7em;color:#888;text-transform:uppercase;letter-spacing:3px;font-weight:600}
.stats-bar .divider{width:3px;height:40px;background:#E8941A;opacity:.4}

/* Summary */
.summary-box{background:#0a0a0a;border:2px solid #222;border-left:4px solid #E8941A;padding:16px 20px;margin-bottom:24px;font-size:0.85em;color:#999;line-height:1.7}
.summary-box strong{color:#E8941A;font-family:'Anton',sans-serif;letter-spacing:1px;font-weight:400}

/* VIDEO GRID */
.video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px}

.card{background:#0a0a0a;overflow:hidden;border:2px solid #1a1a1a;transition:all .25s ease;position:relative}
.card:hover{border-color:#E8941A;transform:translateY(-4px);box-shadow:0 12px 40px rgba(232,148,26,0.15)}

.card a{text-decoration:none;color:inherit;display:block}

.thumb-wrap{position:relative;overflow:hidden}
.thumb-wrap img{width:100%;aspect-ratio:16/9;object-fit:cover;background:#111;display:block;transition:all .3s}
.card:hover .thumb-wrap img{filter:brightness(0.6) contrast(1.1)}

/* Play button - orange circle */
.play-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);width:60px;height:60px;background:#E8941A;display:flex;align-items:center;justify-content:center;transition:transform .25s ease;pointer-events:none}
.play-icon::after{content:'';border-style:solid;border-width:12px 0 12px 20px;border-color:transparent transparent transparent #000;margin-left:3px}
.card:hover .play-icon{transform:translate(-50%,-50%) scale(1)}

/* Episode number overlay */
.ep-overlay{position:absolute;top:8px;right:8px;background:#E8941A;color:#000;font-family:'Anton',sans-serif;font-size:0.75em;padding:4px 10px;letter-spacing:2px;text-transform:uppercase}

.card-body{padding:14px 16px}
.card-title{font-size:0.9em;color:#fff;margin-bottom:8px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;font-weight:700;text-decoration:none;display:block}
.card-title:hover{color:#E8941A}

.card-meta{font-size:0.75em;color:#666;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}

.card-themes{display:flex;gap:6px;flex-wrap:wrap}
.badge{font-size:0.6em;padding:4px 10px;background:#1a1a0a;color:#E8941A;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;border:1px solid rgba(232,148,26,0.3)}

/* Pagination */
.pagination{display:flex;justify-content:center;gap:4px;margin-top:28px;flex-wrap:wrap}
.page-btn{background:#111;color:#888;border:2px solid #222;padding:8px 16px;border-radius:0;cursor:pointer;font-size:13px;font-weight:700;transition:all .2s;font-family:'Anton',sans-serif;letter-spacing:1px}
.page-btn.active{background:#E8941A;color:#000;border-color:#E8941A}
.page-btn:hover:not(.active){border-color:#E8941A;color:#E8941A}

/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{position:relative;width:100%;border-right:none;border-bottom:3px solid #E8941A}
  .main{margin-left:0;width:100%;padding:16px}
  body{flex-direction:column}
  .video-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:480px){
  .video-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo-area">
    <div class="logo-title">SCOTT<br>ADAMS</div>
    <div class="logo-accent">Real Coffee</div>
    <p class="subtitle">Complete Video Inventory</p>
  </div>

  <input type="text" class="search-box" id="searchBox" placeholder="Search 3,102 episodes..." oninput="applyFilters()">
  <button class="clear-btn" onclick="clearAllFilters()">Clear Filters</button>
  <div class="active-filters" id="activeFilters"></div>

  <div class="filter-group">
    <label>Year</label>
    <select id="yearFilter" onchange="applyFilters()"><option value="">All Years</option></select>
  </div>
  <div class="filter-group">
    <label>Month</label>
    <select id="monthFilter" onchange="applyFilters()"><option value="">All Months</option></select>
  </div>
  <div class="filter-group">
    <label>Themes</label>
    <div id="themeList"></div>
  </div>
  <div class="filter-group" style="margin-top:20px;">
    <button class="export-btn" onclick="exportJSON()">Export JSON</button>
    <button class="export-btn" onclick="exportCSV()" style="margin-top:6px;">Export CSV</button>
  </div>
  <p class="sidebar-footer">3,102 episodes &bull; 2018&ndash;2026</p>
</div>

<div class="main">
  <div class="stats-bar" id="statsBar"></div>
  <div class="summary-box" id="summaryBox"></div>
  <div class="video-grid" id="videoGrid"></div>
  <div class="pagination" id="pagination"></div>
</div>

let filtered = VIDEOS.slice();
let activeTheme = '';
let page = 0;
const PER_PAGE = 60;
const THEMES = ['Persuasion','Trump','AI & Tech','COVID','Media','Economy','Climate','Election','Mental Models','Race & DEI','China & Foreign','Free Speech','Health'];

function init(){
  buildYearFilter();
  buildMonthFilter();
  buildThemeList();
  applyFilters();
}

function buildYearFilter(){
  const sel = document.getElementById('yearFilter');
  const years = [...new Set(VIDEOS.map(v=>v.d?v.d.substring(0,4):'').filter(Boolean))].sort();
  years.forEach(y=>{const o=document.createElement('option');o.value=y;o.textContent=y;sel.appendChild(o);});
}

function buildMonthFilter(){
  const sel = document.getElementById('monthFilter');
  const months=['01','02','03','04','05','06','07','08','09','10','11','12'];
  const names=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  months.forEach((m,i)=>{const o=document.createElement('option');o.value=m;o.textContent=names[i];sel.appendChild(o);});
}

function buildThemeList(){
  const div = document.getElementById('themeList');
  THEMES.forEach(th=>{
    const btn = document.createElement('div');
    btn.className = 'theme-item';
    btn.textContent = th;
    btn.dataset.theme = th;
    btn.onclick = function(){
      if(activeTheme === th){
        activeTheme = '';
        btn.classList.remove('active');
      } else {
        document.getElementById('searchBox').value = '';
        document.getElementById('yearFilter').value = '';
        document.getElementById('monthFilter').value = '';
        document.querySelectorAll('.theme-item').forEach(b=>b.classList.remove('active'));
        activeTheme = th;
        btn.classList.add('active');
      }
      applyFilters();
    };
    div.appendChild(btn);
  });
}

function clearAllFilters(){
  document.getElementById('searchBox').value = '';
  document.getElementById('yearFilter').value = '';
  document.getElementById('monthFilter').value = '';
  activeTheme = '';
  document.querySelectorAll('.theme-item').forEach(b=>b.classList.remove('active'));
  applyFilters();
}

function updateActiveFilters(){
  const box = document.getElementById('activeFilters');
  const parts = [];
  const q = document.getElementById('searchBox').value.trim();
  const y = document.getElementById('yearFilter').value;
  const m = document.getElementById('monthFilter').value;
  const mNames = {'01':'Jan','02':'Feb','03':'Mar','04':'Apr','05':'May','06':'Jun','07':'Jul','08':'Aug','09':'Sep','10':'Oct','11':'Nov','12':'Dec'};
  if(q) parts.push('Search: "'+q+'"');
  if(y) parts.push('Year: '+y);
  if(m) parts.push('Month: '+mNames[m]);
  if(activeTheme) parts.push('Theme: '+activeTheme);
  if(parts.length > 0){
    box.style.display = 'block';
    box.innerHTML = parts.join(' &bull; ') + ' <span style="cursor:pointer;margin-left:8px;color:#ff6b6b;" onclick="clearAllFilters()">&times; clear</span>';
  } else {
    box.style.display = 'none';
    box.innerHTML = '';
  }
}

function applyFilters(){
  const q = document.getElementById('searchBox').value.toLowerCase().trim();
  const year = document.getElementById('yearFilter').value;
  const month = document.getElementById('monthFilter').value;
  filtered = VIDEOS.filter(v=>{
    if(q && !v.t.toLowerCase().includes(q)) return false;
    if(year && (!v.d || !v.d.startsWith(year))) return false;
    if(month && (!v.d || v.d.substring(5,7) !== month)) return false;
    if(activeTheme && !v.th.includes(activeTheme)) return false;
    return true;
  });
  page = 0;
  updateActiveFilters();
  updateStats();
  updateSummary();
  renderPage();
  renderPagination();
}

function updateStats(){
  const bar = document.getElementById('statsBar');
  const total = VIDEOS.length;
  const shown = filtered.length;
  const themes = new Set();
  filtered.forEach(v=>v.th.forEach(t=>themes.add(t)));
  const years = new Set();
  filtered.forEach(v=>{ if(v.d) years.add(v.d.substring(0,4)); });
  bar.innerHTML =
    '<div><div class="big-num">'+shown+'</div><div class="big-label">Episodes</div></div>' +
    '<div class="divider"></div>' +
    '<div><div class="big-num">'+themes.size+'</div><div class="big-label">Themes</div></div>' +
    '<div class="divider"></div>' +
    '<div><div class="big-num">'+years.size+'</div><div class="big-label">Years</div></div>' +
    (shown < total ? '<div style="margin-left:auto;color:#E8941A;font-family:Anton;font-size:0.85em;letter-spacing:2px;text-transform:uppercase;">Filtered from '+total+'</div>' : '');
}

function updateSummary(){
  const box = document.getElementById('summaryBox');
  if(filtered.length === 0){ box.innerHTML = '<p style="color:#666;">No episodes match. Try clearing some filters.</p>'; return; }
  const themeCounts = {};
  filtered.forEach(v=>v.th.forEach(t=>{ themeCounts[t] = (themeCounts[t]||0)+1; }));
  const sorted = Object.entries(themeCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const years = {};
  filtered.forEach(v=>{ if(v.d){ const y=v.d.substring(0,4); years[y]=(years[y]||0)+1; }});
  const ySorted = Object.entries(years).sort((a,b)=>a[0].localeCompare(b[0]));
  let html = '<strong>Top Themes: </strong>' + sorted.map(([t,c])=>t+' ('+c+')').join(', ');
  html += '<br><strong>By Year: </strong>' + ySorted.map(([y,c])=>y+': '+c).join(', ');
  box.innerHTML = html;
}

function renderPage(){
  const grid = document.getElementById('videoGrid');
  const start = page * PER_PAGE;
  const slice = filtered.slice(start, start + PER_PAGE);
  if(slice.length === 0){ grid.innerHTML = '<p style="color:#444;text-align:center;grid-column:1/-1;font-family:Anton;font-size:1.4em;padding:60px;letter-spacing:3px;text-transform:uppercase;">No Results Found</p>'; return; }
  grid.innerHTML = slice.map(v=>{
    const thumb = 'https://i.ytimg.com/vi/'+v.i+'/mqdefault.jpg';
    const url = 'https://www.youtube.com/watch?v='+v.i;
    const badges = v.th.map(t=>'<span class="badge">'+t+'</span>').join('');
    const epLabel = v.e ? 'EP '+v.e : '';
    return '<div class="card">' +
      '<a href="'+url+'" target="_blank" rel="noopener"><div class="thumb-wrap"><img src="'+thumb+'" alt="" loading="lazy"><div class="play-icon"></div>'+(epLabel?'<div class="ep-overlay">'+epLabel+'</div>':'')+'</div></a>' +
      '<div class="card-body">' +
        '<a href="'+url+'" target="_blank" rel="noopener" class="card-title">'+v.t+'</a>' +
        '<div class="card-meta">'+(v.d||'Unknown')+(epLabel ? ' &bull; '+epLabel : '')+'</div>' +
        '<div class="card-themes">'+badges+'</div>' +
      '</div></div>';
  }).join('');
}

function renderPagination(){
  const div = document.getElementById('pagination');
  const total = Math.ceil(filtered.length / PER_PAGE);
  if(total <= 1){ div.innerHTML = ''; return; }
  let html = '';
  const maxVisible = 7;
  let start = Math.max(0, page - Math.floor(maxVisible/2));
  let end = Math.min(total, start + maxVisible);
  if(end - start < maxVisible) start = Math.max(0, end - maxVisible);

  if(page > 0) html += '<button class="page-btn" onclick="goPage('+(page-1)+')">&#9664;</button>';
  if(start > 0) { html += '<button class="page-btn" onclick="goPage(0)">1</button>'; if(start > 1) html += '<span style="color:#333;padding:8px;font-family:Anton">...</span>'; }
  for(let i=start;i<end;i++){
    html += '<button class="page-btn'+(i===page?' active':'')+'" onclick="goPage('+i+')">'+(i+1)+'</button>';
  }
  if(end < total) { if(end < total-1) html += '<span style="color:#333;padding:8px;font-family:Anton">...</span>'; html += '<button class="page-btn" onclick="goPage('+(total-1)+')">'+total+'</button>'; }
  if(page < total-1) html += '<button class="page-btn" onclick="goPage('+(page+1)+')">&#9654;</button>';
  div.innerHTML = html;
}

function goPage(p){ page = p; renderPage(); renderPagination(); window.scrollTo({top:0,behavior:'smooth'}); }

function exportJSON(){
  const blob = new Blob([JSON.stringify(filtered,null,2)],{type:'application/json'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='scott-adams-videos.json'; a.click();
}

function exportCSV(){
  let csv = 'Episode,Title,Date,Themes,URL\n';
  filtered.forEach(v=>{
    csv += v.e+',"'+v.t.replace(/"/g,'""')+'",'+v.d+',"'+v.th.join('; ')+'",https://www.youtube.com/watch?v='+v.i+'\n';
  });
  const blob = new Blob([csv],{type:'text/csv'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='scott-adams-videos.csv'; a.click();
}

init();
</script>
